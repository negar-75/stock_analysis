

services:
  
  db:
    image: postgres:15
    container_name: stock_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      
    ports:
      - "5432:5432"
  db_test:
    image: postgres:15
    container_name: stock_db_test
    environment:
      POSTGRES_DB: stock_analysis_test
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: 7648
     
    ports:
      - "5433:5432"
  redis:
    image: redis:6.2-alpine
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --save 20 1
    volumes:
      - cache:/data


  
  app:
    build: 
      context: .
      target: prod
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
  test:
    build:
      context: .
      target: test
    depends_on:
      - db_test
      - redis
    env_file:
      - .env.test
    environment:
      POSTGRES_HOST: db_test
volumes:
  cache: